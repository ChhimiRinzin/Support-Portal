<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAA Support – Register</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6df 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: white;
            border-radius: 32px;
            padding: 40px 48px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #2d6a4f;
            margin: 0 auto 24px;
        }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .text-muted { color: #6c7a89; font-size: 14px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; text-align: left; }
        label { font-size: 13px; font-weight: 500; color: #334155; display: block; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
            background: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2d6a4f, #1b5e3f);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary:hover { background: #1b5e3f; transform: translateY(-1px); }
        .login-link { margin-top: 24px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
        .text-small { font-size: 12px; color: #94a3b8; }
        a { color: #2d6a4f; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .form-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        /* Modal popup (same as login) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
        }
        .modal-box i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .modal-box.success i { color: #10b981; }
        .modal-box.error i { color: #ef4444; }
        .modal-box button {
            margin-top: 20px;
            background: #0F5C5F;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="register-card">
    <div class="logo-circle">'_'</div>
    <h1>Create Account</h1>
    <p class="text-muted">Join RAA Support Portal</p>
    <form id="registerForm">
        <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" required></div>
        <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Designation</label><input type="text" id="designation" placeholder="e.g., Senior Auditor"></div>
        <div class="form-group"><label>Division</label><input type="text" id="division" placeholder="e.g., SoCD"></div>
        <div class="form-group"><label>Password *</label><input type="password" id="password" required><div class="form-hint">Minimum 6 characters</div></div>
        <div class="form-group"><label>Confirm Password *</label><input type="password" id="confirmPassword" required></div>
        <button type="submit" class="btn-primary">Register →</button>
    </form>
    <div class="login-link"><p class="text-small">Already have an account? <a href="login.html">Login here</a></p></div>
</div>
<script>
    const API_BASE = 'http://localhost:5000/api';

    function showModal(message, type = 'success', redirectUrl = null) {
        const existing = document.querySelector('.modal-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-box ${type}">
                <i>${type === 'success' ? '✅' : '❌'}</i>
                <p>${message}</p>
                <button id="modalOkBtn">OK</button>
            </div>
        `;
        document.body.appendChild(overlay);

        const okBtn = overlay.querySelector('#modalOkBtn');
        const closeModal = () => {
            overlay.remove();
            if (redirectUrl) window.location.href = redirectUrl;
        };
        okBtn.addEventListener('click', closeModal);
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const designation = document.getElementById('designation').value.trim();
        const division = document.getElementById('division').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!fullName || !email || !password) {
            showModal('Please fill all required fields.', 'error');
            return;
        }
        if (password !== confirm) {
            showModal('Passwords do not match.', 'error');
            return;
        }
        if (password.length < 6) {
            showModal('Password must be at least 6 characters.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: fullName, email, designation, division, password })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message);

            showModal('Registration successful! Redirecting...', 'success', 'index.html');
        } catch (err) {
            showModal(err.message, 'error');
        }
    });
</script>
</body>
</html>
