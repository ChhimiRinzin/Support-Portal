<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RAA Support – Manager Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body { background: #F4F6F9; }
        .app { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #E2E8F0;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            overflow-y: auto;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #E2E8F0; }
        .sidebar-header h2 { color: #0F5C5F; font-size: 1.3rem; }
        .nav-menu { padding: 16px 12px; display: flex; flex-direction: column; gap: 6px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            color: #334155;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item:hover { background: #E9F4F4; color: #0F5C5F; }
        .nav-item.active { background: #0F5C5F; color: white; }
        .nav-item.has-submenu { justify-content: space-between; }
        .submenu {
            margin-left: 34px;
            list-style: none;
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 0;
        }
        .submenu.show { max-height: 200px; }
        .submenu li { padding: 8px 12px; border-radius: 8px; cursor: pointer; color: #475569; font-size: 0.85rem; }
        .submenu li:hover { background: #E9F4F4; color: #0F5C5F; }
        .main { flex: 1; margin-left: 260px; }
        .topbar {
            background: white;
            padding: 12px 24px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #E2E8F0;
        }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #0F5C5F; margin-right: auto; }
        .topbar-right { display: flex; align-items: center; gap: 20px; }
        .notification-bell { position: relative; cursor: pointer; }
        .notification-bell .badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #EF4444;
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            background: #0F5C5F;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .btn-icon { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #475569; }
        .content { padding: 24px 28px; }
        .pane {
            display: none;
        }
        .pane.active {
            display: block;
        }
        .welcome-card {
            background: linear-gradient(135deg, #0F5C5F 0%, #1A7F7A 100%);
            color: white;
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .welcome-card h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-left: 4px solid;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }
        .stat-number {
            font-size: 32px;
            font-weight: 700;
        }
        .stat-label {
            font-size: 14px;
            color: #64748B;
            margin-top: 4px;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
        }
        .filter-input, .filter-select {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            background: white;
            font-size: 13px;
        }
        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 200px;
        }
        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
        }
        .search-wrapper input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            font-size: 13px;
        }
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .tickets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .tickets-table th, .tickets-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #E2E8F0;
            font-size: 13px;
        }
        .tickets-table th { background: #F8FAFC; font-weight: 600; }
        .view-btn {
            background: #0F5C5F;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            cursor: pointer;
        }
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            background: white;
            border-radius: 16px;
            color: #64748B;
        }
        /* Status badge colors for table */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-pending_approval { background: #FEF3C7; color: #B45309; }
        .status-approved { background: #DCFCE7; color: #166534; }
        .status-in_progress { background: #E0F2FE; color: #0369A1; }
        .status-resolved { background: #DCFCE7; color: #166534; }
        .status-rejected { background: #FEE2E2; color: #B91C1C; }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 1000px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 28px;
            cursor: pointer;
            color: #94A3B8;
            transition: 0.2s;
        }
        .modal-close:hover { color: #b91c1c; }
        .modal-section {
            margin-bottom: 28px;
        }
        .modal-section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0F5C5F;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px;
            margin-top: 8px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.9rem;
            color: #1E293B;
            font-weight: 500;
            word-break: break-word;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 0.85rem;
        }
        .items-table th, .items-table td {
            border: 1px solid #E2E8F0;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .items-table th {
            background: #F8FAFC;
            font-weight: 600;
            color: #334155;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 24px 0;
            padding: 16px 0;
            border-top: 1px solid #E2E8F0;
            border-bottom: 1px solid #E2E8F0;
            align-items: center;
        }
        .comment {
            border-left: 3px solid #0F5C5F;
            margin: 12px 0;
            padding: 12px 16px;
            background: #F8FAFC;
            border-radius: 12px;
        }
        .internal-note {
            background: #FEF9E3;
            border-left-color: #F59E0B;
        }
        .comment-meta {
            font-size: 0.75rem;
            color: #64748B;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #CBD5E1;
            font-size: 0.9rem;
            margin: 8px 0;
        }
        select, .btn-primary-sm {
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            background: white;
        }
        .btn-primary-sm {
            background: #0F5C5F;
            color: white;
            border: none;
            cursor: pointer;
        }
        .status-badge-lg {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #E2E8F0;
        }
        .status-pending_approval { background: #FEF3C7; color: #B45309; }
        .status-approved { background: #DCFCE7; color: #166534; }
        .status-in_progress { background: #E0F2FE; color: #0369A1; }
        .status-resolved { background: #DCFCE7; color: #166534; }
        .status-rejected { background: #FEE2E2; color: #B91C1C; }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .menu-toggle { display: block; }
            .topbar { justify-content: space-between; }
        }
        @media (max-width: 640px) {
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>RAA Support</h2></div>
        <div class="nav-menu">
            <div class="nav-item active" data-view="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item" data-view="assigned"><i class="fas fa-tasks"></i> Assigned to Me</div>
            <div class="nav-divider" style="height:1px; background:#E2E8F0; margin:12px 0;"></div>
            <div class="nav-item" data-service="repair"><i class="fas fa-tools"></i> Repair & Maintenance</div>
            <div class="nav-item" data-service="ict"><i class="fas fa-laptop-code"></i> ICT Services</div>
            <div class="nav-item" data-service="vehicle"><i class="fas fa-car"></i> Vehicle Requisition</div>
            <div class="nav-item" data-service="aims"><i class="fas fa-exchange-alt"></i> AIMS Change Request</div>
            <div class="nav-item has-submenu" id="aswsMenu">
                <span><i class="fas fa-building"></i> ASWS</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <ul class="submenu" id="aswsSubmenu">
                <li data-service="asws-membership">ASWS Registration</li>
                <li data-service="asws-loan">ASWS Loan Application</li>
            </ul>
        </div>
    </div>
    <div class="main">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="topbar-right">
                <div class="notification-bell" id="notificationBell"><i class="fas fa-bell"></i><span class="badge">0</span></div>
                <span id="userName"></span>
                <div class="user-avatar" id="userAvatar"></div>
                <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div class="content">
            <!-- Dashboard Pane (tickets created by manager) -->
            <div id="dashboardPane" class="pane active">
                <div class="welcome-card">
                    <div><h2 id="dashboardGreeting">Good morning, <span id="dashboardWelcomeName"></span> 👋</h2><p>Here’s an overview of your service requests</p></div>
                    <div><i class="fas fa-calendar-alt"></i> <span id="dashboardDate"></span></div>
                </div>
                <div class="stats-grid" id="dashboardStatsGrid"></div>
                <div class="filter-bar">
                    <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="dashboardSearch" placeholder="Search by ID or title"></div>
                    <select id="dashboardStatusFilter" class="filter-select"><option value="">All status</option><option value="pending_approval">Pending</option><option value="approved">Approved</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="rejected">Rejected</option></select>
                    <select id="dashboardCategoryFilter" class="filter-select"><option value="">All services</option><option value="repair">Repair</option><option value="ict">ICT</option><option value="vehicle">Vehicle</option><option value="aims">AIMS</option><option value="asws_membership">ASWS Registration</option><option value="asws_loan">ASWS Loan</option></select>
                    <input type="date" id="dashboardDateFilter" class="filter-input">
                </div>
                <div id="dashboardTicketsContainer"></div>
            </div>
            <!-- Assigned to Me Pane (tickets assigned to manager by others) -->
            <div id="assignedPane" class="pane">
                <div class="welcome-card">
                    <div><h2 id="assignedGreeting">Good morning, <span id="assignedWelcomeName"></span> 👋</h2><p>Here’s an overview of tickets assigned to you</p></div>
                    <div><i class="fas fa-calendar-alt"></i> <span id="assignedDate"></span></div>
                </div>
                <div class="stats-grid" id="assignedStatsGrid"></div>
                <div class="filter-bar">
                    <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="assignedSearch" placeholder="Search by ID or title"></div>
                    <select id="assignedStatusFilter" class="filter-select"><option value="">All status</option><option value="pending_approval">Pending</option><option value="approved">Approved</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="rejected">Rejected</option></select>
                    <select id="assignedCategoryFilter" class="filter-select"><option value="">All services</option><option value="repair">Repair</option><option value="ict">ICT</option><option value="vehicle">Vehicle</option><option value="aims">AIMS</option><option value="asws_membership">ASWS Registration</option><option value="asws_loan">ASWS Loan</option></select>
                    <input type="date" id="assignedDateFilter" class="filter-input">
                </div>
                <div id="assignedTicketsContainer"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal for ticket details (enhanced) -->
<div id="ticketModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }

    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (token) headers['x-auth-token'] = token;
        const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        if (res.status === 401) {
            localStorage.clear();
            window.location.href = 'index.html';
            throw new Error('Session expired');
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Request failed');
        return data;
    }

    const user = getUser();
    if (!user || !user.id) window.location.href = 'index.html';

    document.getElementById('userName').innerText = user.full_name || user.email?.split('@')[0] || 'Manager';
    document.getElementById('userAvatar').innerText = (user.full_name || 'U').charAt(0).toUpperCase();
    document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

    const aswsMenu = document.getElementById('aswsMenu');
    const aswsSubmenu = document.getElementById('aswsSubmenu');
    aswsMenu.addEventListener('click', (e) => { e.stopPropagation(); aswsSubmenu.classList.toggle('show'); });

    // Sidebar navigation for service links
    document.querySelectorAll('.nav-item[data-service], .submenu li').forEach(item => {
        item.addEventListener('click', () => {
            const service = item.dataset.service;
            let url = '';
            if (service === 'repair') url = 'repair-form.html';
            else if (service === 'ict') url = 'ict-form.html';
            else if (service === 'vehicle') url = 'vehicle-requisition-form.html';
            else if (service === 'aims') url = 'aims-change-form.html';
            else if (service === 'asws-membership') url = 'submit-request.html?category=asws_membership';
            else if (service === 'asws-loan') url = 'submit-request.html?category=asws_loan';
            window.location.href = url;
        });
    });

    function updateWelcomeAndDate() {
        const hour = new Date().getHours();
        let greeting = 'Good morning';
        if (hour >= 12 && hour < 18) greeting = 'Good afternoon';
        else if (hour >= 18) greeting = 'Good evening';
        const userName = user.full_name?.split(' ')[0] || 'Manager';
        const today = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('dashboardGreeting').innerHTML = `${greeting}, <span id="dashboardWelcomeName">${userName}</span> 👋`;
        document.getElementById('dashboardDate').innerText = today;
        document.getElementById('assignedGreeting').innerHTML = `${greeting}, <span id="assignedWelcomeName">${userName}</span> 👋`;
        document.getElementById('assignedDate').innerText = today;
    }

    // View switching
    document.querySelectorAll('.nav-item[data-view]').forEach(item => {
        item.addEventListener('click', () => {
            const view = item.dataset.view;
            document.querySelectorAll('.nav-item[data-view]').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            if (view === 'dashboard') {
                document.getElementById('dashboardPane').classList.add('active');
                document.getElementById('assignedPane').classList.remove('active');
                loadDashboardTickets();
            } else if (view === 'assigned') {
                document.getElementById('assignedPane').classList.add('active');
                document.getElementById('dashboardPane').classList.remove('active');
                loadAssignedTickets();
            }
        });
    });

    // Dashboard Pane (tickets created by manager)
    let dashboardTickets = [], dashboardFiltered = [];
    let currentDashboardPage = 1;
    async function loadDashboardTickets() {
        try {
            const all = await apiCall('/requests');
            dashboardTickets = all.filter(t => t.created_by === user.id);
            applyDashboardFilters();
        } catch (err) {
            document.getElementById('dashboardTicketsContainer').innerHTML = `<div class="empty-state">❌ Error: ${err.message}</div>`;
        }
    }
    function applyDashboardFilters() {
        const search = document.getElementById('dashboardSearch').value.toLowerCase();
        const status = document.getElementById('dashboardStatusFilter').value;
        const category = document.getElementById('dashboardCategoryFilter').value;
        const date = document.getElementById('dashboardDateFilter').value;
        dashboardFiltered = dashboardTickets.filter(t => {
            const matchSearch = t.ticket_number.toLowerCase().includes(search) || t.title.toLowerCase().includes(search);
            const matchStatus = !status || t.status === status;
            const matchCategory = !category || t.category === category;
            const matchDate = !date || new Date(t.created_at).toISOString().slice(0,10) === date;
            return matchSearch && matchStatus && matchCategory && matchDate;
        });
        renderDashboardStats();
        renderDashboardTickets();
    }
    function renderDashboardStats() {
        const total = dashboardFiltered.length;
        const pending = dashboardFiltered.filter(t => t.status === 'pending_approval').length;
        const approved = dashboardFiltered.filter(t => t.status === 'approved').length;
        const rejected = dashboardFiltered.filter(t => t.status === 'rejected').length;
        document.getElementById('dashboardStatsGrid').innerHTML = `
            <div class="stat-card" style="border-left-color:#F59E0B"><div class="stat-number">${total}</div><div class="stat-label">Total Tickets</div></div>
            <div class="stat-card" style="border-left-color:#3B82F6"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-card" style="border-left-color:#10B981"><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>
            <div class="stat-card" style="border-left-color:#EF4444"><div class="stat-number">${rejected}</div><div class="stat-label">Rejected</div></div>
        `;
    }
    function renderDashboardTickets() {
        const container = document.getElementById('dashboardTicketsContainer');
        if (dashboardFiltered.length === 0) { container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><p>No tickets found. Use the sidebar to create one.</p></div>`; return; }
        const rowsPerPage = 5;
        const start = (currentDashboardPage-1)*rowsPerPage;
        const paginated = dashboardFiltered.slice(start, start+rowsPerPage);
        let html = `<div class="table-container"><table class="tickets-table"><thead><tr><th>Ticket #</th><th>Service</th><th>Title</th><th>Date</th><th>Status</th><th>Action</th></td></thead><tbody>`;
        for (const t of paginated) {
            const statusClass = `status-${t.status}`;
            html += `<tr>
                <td>${t.ticket_number}</td>
                <td>${t.category.replace('_',' ')}</td>
                <td>${t.title}</td>
                <td>${new Date(t.created_at).toLocaleDateString()}</td>
                <td><span class="status-badge ${statusClass}">${t.status.replace('_',' ')}</span></td>
                <td><button class="view-btn" onclick="showTicketModal(${t.id})">View Details</button></td>
            </tr>`;
        }
        html += `</tbody><table><div id="dashboardPagination" style="padding:12px; text-align:center;"></div></div>`;
        container.innerHTML = html;
        const totalPages = Math.ceil(dashboardFiltered.length / rowsPerPage);
        document.getElementById('dashboardPagination').innerHTML = `<button onclick="dashboardChangePage(-1)" ${currentDashboardPage===1?'disabled':''}>Prev</button> Page ${currentDashboardPage} of ${totalPages||1} <button onclick="dashboardChangePage(1)" ${currentDashboardPage===totalPages||totalPages===0?'disabled':''}>Next</button>`;
    }
    window.dashboardChangePage = (delta) => { currentDashboardPage += delta; renderDashboardTickets(); };
    document.getElementById('dashboardSearch').addEventListener('input', () => { currentDashboardPage = 1; applyDashboardFilters(); });
    document.getElementById('dashboardStatusFilter').addEventListener('change', () => { currentDashboardPage = 1; applyDashboardFilters(); });
    document.getElementById('dashboardCategoryFilter').addEventListener('change', () => { currentDashboardPage = 1; applyDashboardFilters(); });
    document.getElementById('dashboardDateFilter').addEventListener('change', () => { currentDashboardPage = 1; applyDashboardFilters(); });

    // Assigned Pane (tickets assigned to manager, not created by manager)
    let assignedTickets = [], assignedFiltered = [];
    let currentAssignedPage = 1;
    async function loadAssignedTickets() {
        try {
            const all = await apiCall('/requests');
            assignedTickets = all.filter(t => t.assigned_to === user.id && t.created_by !== user.id);
            applyAssignedFilters();
        } catch (err) { document.getElementById('assignedTicketsContainer').innerHTML = `<div class="empty-state">❌ Error: ${err.message}</div>`; }
    }
    function applyAssignedFilters() {
        const search = document.getElementById('assignedSearch').value.toLowerCase();
        const status = document.getElementById('assignedStatusFilter').value;
        const category = document.getElementById('assignedCategoryFilter').value;
        const date = document.getElementById('assignedDateFilter').value;
        assignedFiltered = assignedTickets.filter(t => {
            const matchSearch = t.ticket_number.toLowerCase().includes(search) || t.title.toLowerCase().includes(search);
            const matchStatus = !status || t.status === status;
            const matchCategory = !category || t.category === category;
            const matchDate = !date || new Date(t.created_at).toISOString().slice(0,10) === date;
            return matchSearch && matchStatus && matchCategory && matchDate;
        });
        renderAssignedStats();
        renderAssignedTickets();
    }
    function renderAssignedStats() {
        const total = assignedFiltered.length;
        const pending = assignedFiltered.filter(t => t.status === 'pending_approval').length;
        const approved = assignedFiltered.filter(t => t.status === 'approved').length;
        const rejected = assignedFiltered.filter(t => t.status === 'rejected').length;
        document.getElementById('assignedStatsGrid').innerHTML = `
            <div class="stat-card" style="border-left-color:#F59E0B"><div class="stat-number">${total}</div><div class="stat-label">Total Tickets</div></div>
            <div class="stat-card" style="border-left-color:#3B82F6"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat-card" style="border-left-color:#10B981"><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>
            <div class="stat-card" style="border-left-color:#EF4444"><div class="stat-number">${rejected}</div><div class="stat-label">Rejected</div></div>
        `;
    }
    function renderAssignedTickets() {
        const container = document.getElementById('assignedTicketsContainer');
        if (assignedFiltered.length === 0) { container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><p>No tickets assigned to you by others.</p></div>`; return; }
        const rowsPerPage = 5;
        const start = (currentAssignedPage-1)*rowsPerPage;
        const paginated = assignedFiltered.slice(start, start+rowsPerPage);
        let html = `<div class="table-container"><table class="tickets-table"><thead><tr><th>Ticket #</th><th>Service</th><th>Title</th><th>Requester</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        for (const t of paginated) {
            const statusClass = `status-${t.status}`;
            html += `<tr>
                <td>${t.ticket_number}</td>
                <td>${t.category.replace('_',' ')}</td>
                <td>${t.title}</td>
                <td>${t.requester_email || t.requester_name}</td>
                <td>${new Date(t.created_at).toLocaleDateString()}</td>
                <td><span class="status-badge ${statusClass}">${t.status.replace('_',' ')}</span></td>
                <td><button class="view-btn" onclick="showTicketModal(${t.id})">View Details</button></td>
            </tr>`;
        }
        html += `</tbody></table><div id="assignedPagination" style="padding:12px; text-align:center;"></div></div>`;
        container.innerHTML = html;
        const totalPages = Math.ceil(assignedFiltered.length / rowsPerPage);
        document.getElementById('assignedPagination').innerHTML = `<button onclick="assignedChangePage(-1)" ${currentAssignedPage===1?'disabled':''}>Prev</button> Page ${currentAssignedPage} of ${totalPages||1} <button onclick="assignedChangePage(1)" ${currentAssignedPage===totalPages||totalPages===0?'disabled':''}>Next</button>`;
    }
    window.assignedChangePage = (delta) => { currentAssignedPage += delta; renderAssignedTickets(); };
    document.getElementById('assignedSearch').addEventListener('input', () => { currentAssignedPage = 1; applyAssignedFilters(); });
    document.getElementById('assignedStatusFilter').addEventListener('change', () => { currentAssignedPage = 1; applyAssignedFilters(); });
    document.getElementById('assignedCategoryFilter').addEventListener('change', () => { currentAssignedPage = 1; applyAssignedFilters(); });
    document.getElementById('assignedDateFilter').addEventListener('change', () => { currentAssignedPage = 1; applyAssignedFilters(); });

    // Modal functions (same as before, but status badge colors are already applied via CSS classes)
    let currentModalTicket = null;
    let modalCanManage = false;

    async function showTicketModal(ticketId) {
        const modal = document.getElementById('ticketModal');
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = '<div style="text-align:center; padding:40px;">Loading...</div>';
        modal.classList.add('active');
        try {
            const data = await apiCall(`/requests/${ticketId}`);
            currentModalTicket = data.ticket;
            modalCanManage = (user.id !== currentModalTicket.created_by);
            renderModalTicket();
            renderModalComments(data.comments);
            attachModalEventListeners();
        } catch (err) {
            modalContent.innerHTML = `<div style="color:red; padding:20px;">Error: ${err.message}</div>`;
        }
    }

    function closeModal() {
        document.getElementById('ticketModal').classList.remove('active');
        currentModalTicket = null;
    }

    function renderModalTicket() {
        const container = document.getElementById('modalContent');
        const ticket = currentModalTicket;
        const fd = ticket.form_data || {};

        let requisitionerHtml = '';
        if (fd.requisitioner) {
            const r = fd.requisitioner;
            requisitionerHtml = `
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-user"></i> Requisitioned by</div>
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">Name</span><span class="info-value">${escapeHtml(r.name || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Designation</span><span class="info-value">${escapeHtml(r.designation || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Division</span><span class="info-value">${escapeHtml(r.division || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Email</span><span class="info-value">${escapeHtml(r.email || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Phone</span><span class="info-value">${escapeHtml(r.phone || '-')}</span></div>
                    </div>
                </div>
            `;
        }

        let itemsHtml = '';
        if (fd.items && fd.items.length) {
            itemsHtml = `
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-list"></i> Items requested</div>
                    <table class="items-table">
                        <thead><tr><th>#</th><th>Item Type / Description</th><th>Quantity</th><th>Remarks</th></tr></thead>
                        <tbody>
                            ${fd.items.map((item, idx) => `
                                <tr>
                                    <td>${idx+1}</td>
                                    <td>${escapeHtml(item.itemType || item.description || '')}</td>
                                    <td>${escapeHtml(item.quantity || item.qty || '')}</td>
                                    <td>${escapeHtml(item.remarks || '')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        } else {
            const otherFields = Object.entries(fd).filter(([key]) => !['requisitioner', 'items', 'requisition_date'].includes(key));
            if (otherFields.length) {
                itemsHtml = `
                    <div class="modal-section">
                        <div class="modal-section-title"><i class="fas fa-info-circle"></i> Additional details</div>
                        <div class="info-grid">
                            ${otherFields.map(([key, val]) => `<div class="info-item"><span class="info-label">${escapeHtml(key)}</span><span class="info-value">${escapeHtml(String(val))}</span></div>`).join('')}
                        </div>
                    </div>
                `;
            }
        }

        let statusClass = 'status-badge-lg';
        if (ticket.status === 'pending_approval') statusClass += ' status-pending_approval';
        else if (ticket.status === 'approved') statusClass += ' status-approved';
        else if (ticket.status === 'in_progress') statusClass += ' status-in_progress';
        else if (ticket.status === 'resolved') statusClass += ' status-resolved';
        else if (ticket.status === 'rejected') statusClass += ' status-rejected';

        let actionHtml = '';
        if (modalCanManage) {
            actionHtml = `
                <div class="action-bar">
                    <select id="modalStatusSelect">
                        <option value="pending_approval" ${ticket.status === 'pending_approval' ? 'selected' : ''}>Pending Approval</option>
                        <option value="approved" ${ticket.status === 'approved' ? 'selected' : ''}>Approved</option>
                        <option value="in_progress" ${ticket.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                        <option value="resolved" ${ticket.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                        <option value="rejected" ${ticket.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                    </select>
                    <button id="modalUpdateStatusBtn" class="btn-primary-sm">Update Status</button>
                    ${ticket.status === 'pending_approval' ? '<button id="modalApproveBtn" class="btn-primary-sm" style="background:#10b981;">✅ Approve</button>' : ''}
                </div>
            `;
        }

        container.innerHTML = `
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-ticket-alt"></i> Ticket information</div>
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">Ticket number</span><span class="info-value">${escapeHtml(ticket.ticket_number)}</span></div>
                    <div class="info-item"><span class="info-label">Title</span><span class="info-value">${escapeHtml(ticket.title)}</span></div>
                    <div class="info-item"><span class="info-label">Category</span><span class="info-value">${escapeHtml(ticket.category)}</span></div>
                    <div class="info-item"><span class="info-label">Requester</span><span class="info-value">${escapeHtml(ticket.requester_name || ticket.requester_email)}</span></div>
                    <div class="info-item"><span class="info-label">Created</span><span class="info-value">${new Date(ticket.created_at).toLocaleString()}</span></div>
                    <div class="info-item"><span class="info-label">Status</span><span class="info-value"><span class="${statusClass}">${ticket.status.replace('_',' ')}</span></span></div>
                    <div class="info-item"><span class="info-label">Priority</span><span class="info-value">${escapeHtml(ticket.priority)}</span></div>
                    <div class="info-item"><span class="info-label">Description</span><span class="info-value">${escapeHtml(ticket.description)}</span></div>
                </div>
            </div>
            ${requisitionerHtml}
            ${itemsHtml}
            ${actionHtml}
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-comments"></i> Comments</div>
                <div id="modalCommentsSection"></div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-plus-circle"></i> Add comment</div>
                <textarea id="modalNewComment" rows="3" placeholder="Write your message..."></textarea>
                <div style="margin: 8px 0;"><label><input type="checkbox" id="modalInternalCheck"> Internal note (team only)</label></div>
                <button id="modalSubmitCommentBtn" class="btn-primary-sm">Post Comment</button>
            </div>
        `;
    }

    function renderModalComments(comments) {
        const container = document.getElementById('modalCommentsSection');
        if (!comments.length) {
            container.innerHTML = '<p style="color:#64748B;">No comments yet.</p>';
            return;
        }
        let html = '';
        for (const c of comments) {
            const isInternal = c.is_internal;
            if (isInternal && !modalCanManage && currentModalTicket.created_by === user.id) continue;
            const noteClass = isInternal ? 'internal-note' : '';
            html += `
                <div class="comment ${noteClass}">
                    <div class="comment-meta"><strong>${escapeHtml(c.author_name)}</strong> · ${new Date(c.created_at).toLocaleString()} ${isInternal ? '<span style="margin-left:8px;">🔒 Internal note</span>' : ''}</div>
                    <div>${escapeHtml(c.message)}</div>
                </div>
            `;
        }
        container.innerHTML = html || '<p style="color:#64748B;">No public comments yet.</p>';
    }

    function attachModalEventListeners() {
        if (modalCanManage) {
            const updateBtn = document.getElementById('modalUpdateStatusBtn');
            if (updateBtn) {
                updateBtn.onclick = async () => {
                    const newStatus = document.getElementById('modalStatusSelect').value;
                    await apiCall(`/requests/${currentModalTicket.id}/status`, { method: 'PUT', body: JSON.stringify({ status: newStatus }) });
                    if (document.getElementById('dashboardPane').classList.contains('active')) loadDashboardTickets();
                    else loadAssignedTickets();
                    showTicketModal(currentModalTicket.id);
                };
            }
            const approveBtn = document.getElementById('modalApproveBtn');
            if (approveBtn) {
                approveBtn.onclick = async () => {
                    await apiCall(`/requests/${currentModalTicket.id}/approve`, { method: 'PUT' });
                    if (document.getElementById('dashboardPane').classList.contains('active')) loadDashboardTickets();
                    else loadAssignedTickets();
                    showTicketModal(currentModalTicket.id);
                };
            }
        }
        const submitBtn = document.getElementById('modalSubmitCommentBtn');
        if (submitBtn) {
            submitBtn.onclick = async () => {
                const message = document.getElementById('modalNewComment').value.trim();
                if (!message) return alert('Please enter a comment');
                const isInternal = document.getElementById('modalInternalCheck').checked;
                await apiCall(`/requests/${currentModalTicket.id}/comment`, {
                    method: 'POST',
                    body: JSON.stringify({ message, is_internal: isInternal })
                });
                document.getElementById('modalNewComment').value = '';
                document.getElementById('modalInternalCheck').checked = false;
                if (document.getElementById('dashboardPane').classList.contains('active')) loadDashboardTickets();
                else loadAssignedTickets();
                showTicketModal(currentModalTicket.id);
            };
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Notification bell
    async function updateNotificationCount() {
        try {
            const notifs = await apiCall('/notifications');
            const badge = document.querySelector('#notificationBell .badge');
            if (badge) { badge.textContent = notifs.length; badge.style.display = notifs.length ? 'inline-flex' : 'none'; }
        } catch(e) {}
    }
    document.getElementById('notificationBell').addEventListener('click', async () => {
        const notifs = await apiCall('/notifications');
        if (!notifs.length) { alert('No new notifications'); return; }
        let msg = 'Notifications:\n' + notifs.map(n => `- ${n.message}`).join('\n');
        if (confirm(msg + '\nMark all as read?')) {
            await apiCall('/notifications/mark-read', { method: 'POST', body: JSON.stringify({}) });
            updateNotificationCount();
        }
    });
    setInterval(updateNotificationCount, 30000);
    updateNotificationCount();

    updateWelcomeAndDate();
    loadDashboardTickets();
</script>
</body>
</html>
