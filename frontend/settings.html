<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAA Support – Settings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #F4F6F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .settings-card {
            background: white;
            border-radius: 32px;
            padding: 40px 48px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: #2d6a4f;
            margin: 0 auto 24px;
            overflow: hidden;
        }
        .logo-circle img {
            width: 70%;
            height: auto;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1a2f3f;
        }
        .text-muted {
            color: #6c7a89;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            display: block;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            background: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: #2d6a4f;
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
            background: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2d6a4f, #1b5e3f);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: #1b5e3f;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .form-hint {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
        }
        .modal-box i {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }
        .modal-box.success i { color: #10b981; }
        .modal-box.error i { color: #ef4444; }
        .modal-box button {
            margin-top: 20px;
            background: #0F5C5F;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="settings-card">
    <div class="logo-circle">
        <img src="images/RAA Logo.png" alt="RAA Logo">
    </div>
    <h1>Settings</h1>
    <p class="text-muted">Change your password</p>

    <form id="passwordForm">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" required>
            <div class="form-hint">Minimum 6 characters</div>
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn-primary">Update Password</button>
        <button type="button" class="btn-secondary" id="backBtn">Back to Dashboard</button>
    </form>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    function showModal(message, type = 'success') {
        const existing = document.querySelector('.modal-overlay');
        if (existing) existing.remove();
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-box ${type}">
                <i>${type === 'success' ? '✅' : '❌'}</i>
                <p>${message}</p>
                <button onclick="this.closest('.modal-overlay').remove()">OK</button>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            showModal('Passwords do not match.', 'error');
            return;
        }
        if (newPassword.length < 6) {
            showModal('Password must be at least 6 characters.', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/auth/change-password`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'x-auth-token': token
                },
                body: JSON.stringify({
                    new_password: newPassword,
                    confirm_password: confirmPassword
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message);
            showModal('Password changed successfully!', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        } catch (err) {
            showModal(err.message, 'error');
        }
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.is_manager === true) {
            window.location.href = 'manager-dashboard.html';
        } else {
            window.location.href = 'dashboard.html';
        }
    });
</script>
</body>
</html>
