<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RAA Support Portal – Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* All styles remain exactly as before – only the allocation display is enhanced */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #F4F7FC;
            color: #1E2A3A;
            overflow-x: hidden;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #E9EDF2;
            transition: transform 0.3s ease;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 20px;
            border-bottom: 1px solid #E9EDF2;
            text-align: center;
        }

        .sidebar-logo {
            max-width: 100%;
            height: auto;
            max-height: 70px;
        }

        .nav-menu {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-bottom {
            margin-top: auto;
            padding: 16px 12px;
            border-top: 1px solid #E9EDF2;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            color: #334155;
            font-weight: 400;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item i {
            width: 22px;
            font-size: 1.1rem;
        }

        .nav-item:hover {
            background: #E9F4F4;
            color: #0F5C5F;
        }

        .nav-item.active {
            background: #0F5C5F;
            color: white;
        }

        .nav-item.has-submenu {
            justify-content: space-between;
        }

        .submenu {
            margin-left: 34px;
            list-style: none;
            overflow: hidden;
            transition: max-height 0.3s ease;
            max-height: 0;
        }

        .submenu.show {
            max-height: 200px;
        }

        .submenu li {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #475569;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .submenu li:hover {
            background: #E9F4F4;
            color: #0F5C5F;
        }

        .main {
            flex: 1;
            margin-left: 260px;
            transition: margin-left 0.3s ease;
        }

        .topbar {
            background: white;
            padding: 12px 24px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #E9EDF2;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #0F5C5F;
            margin-right: auto;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 1.2rem;
            color: #334155;
        }

        .notification-bell .badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #EF4444;
            color: white;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            background: #0F5C5F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .content {
            padding: 24px 28px;
        }

        .welcome-card {
            background: linear-gradient(135deg, #0F5C5F 0%, #1A7F7A 100%);
            color: white;
            border-radius: 20px;
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .welcome-card h2 {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-left: 3px solid;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }

        .stat-title {
            font-size: 13px;
            color: #64748B;
            margin-bottom: 6px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
        }

        .filter-input, .filter-select {
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            background: white;
            font-size: 13px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 200px;
        }

        .search-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            font-size: 13px;
        }

        .search-wrapper input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border-radius: 30px;
            border: 1px solid #CBD5E1;
            font-size: 13px;
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .tickets-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .tickets-table th, .tickets-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #E2E8F0;
            font-size: 13px;
            vertical-align: middle;
        }

        .tickets-table th {
            background: #F8FAFC;
            font-weight: 600;
        }

        .action-cell {
            white-space: nowrap;
        }
        .action-buttons {
            display: inline-flex;
            flex-direction: row;
            gap: 6px;
            align-items: center;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 30px;
            background: white;
            border: 1px solid #CBD5E1;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .action-btn.view-btn {
            color: #0F5C5F;
        }
        .action-btn.view-btn:hover {
            background: #0F5C5F;
            color: white;
            border-color: #0F5C5F;
        }
        .action-btn.edit-btn {
            color: #F59E0B;
            border-color: #FEF3C7;
        }
        .action-btn.edit-btn:hover {
            background: #F59E0B;
            color: white;
            border-color: #F59E0B;
        }
        .action-btn.delete-btn {
            color: #EF4444;
            border-color: #FEE2E2;
        }
        .action-btn.delete-btn:hover {
            background: #EF4444;
            color: white;
            border-color: #EF4444;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            background: white;
            border-radius: 16px;
            color: #64748B;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }
        .status-pending_approval { background: #FEF3C7; color: #B45309; }
        .status-approved { background: #DCFCE7; color: #166534; }
        .status-in_progress { background: #E0F2FE; color: #0369A1; }
        .status-resolved { background: #DCFCE7; color: #166534; }
        .status-rejected { background: #FEE2E2; color: #B91C1C; }

        .modal, .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active, .edit-modal.active { display: flex; }
        .modal-content, .edit-modal-content {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 28px;
            cursor: pointer;
            color: #9AA6B5;
            transition: 0.2s;
        }
        .modal-close:hover { color: #D14545; }
        .modal-section {
            margin-bottom: 28px;
        }
        .modal-section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0F5C5F;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #E9EDF2;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 24px;
            margin-top: 8px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
        }
        .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.9rem;
            color: #1E293B;
            font-weight: 500;
            word-break: break-word;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 0.85rem;
        }
        .items-table th, .items-table td {
            border: 1px solid #E9EDF2;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }
        .items-table th {
            background: #F8FAFD;
            font-weight: 600;
            color: #334155;
        }
        .comment {
            border-left: 3px solid #0F5C5F;
            margin: 12px 0;
            padding: 12px 16px;
            background: #F8FAFC;
            border-radius: 12px;
        }
        .comment-meta {
            font-size: 0.75rem;
            color: #64748B;
            margin-bottom: 6px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #CBD5E1;
            font-size: 0.9rem;
            margin: 8px 0;
        }
        .btn-primary-sm {
            background: #0F5C5F;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .status-badge-lg {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #E2E8F0;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px;
        }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .menu-toggle { display: block; }
            .topbar { justify-content: space-between; }
        }
        @media (max-width: 640px) {
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
            .welcome-card { flex-direction: column; align-items: flex-start; gap: 12px; }
            .info-grid { grid-template-columns: 1fr; }
            .action-buttons { gap: 4px; }
            .action-btn { padding: 4px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="images/dashboard_logo.png" alt="RAA Logo" class="sidebar-logo">
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-link="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item" data-link="it-services"><i class="fas fa-laptop-code"></i> IT Services</div>
            <div class="nav-item" data-link="aims"><i class="fas fa-exchange-alt"></i> AIMS Change Request</div>
            <div class="nav-item" data-link="repair"><i class="fas fa-tools"></i> Repair & Maintenance</div>
            <div class="nav-item" data-link="vehicle"><i class="fas fa-car"></i> Vehicle Requisition</div>
            <div class="nav-item has-submenu" id="aswsMenu">
                <span><i class="fas fa-building"></i> ASWS</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <ul class="submenu" id="aswsSubmenu">
                <li data-link="asws-registration">ASWS Registration</li>
                <li data-link="asws-loan">ASWS Loan Application</li>
            </ul>
        </div>
        <div class="nav-bottom">
            <div class="nav-item" id="settingsBtnSidebar"><i class="fas fa-cog"></i> Settings</div>
            <div class="nav-item" id="logoutBtnSidebar"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="topbar-right">
                <div class="notification-bell" id="notificationBell"><i class="fas fa-bell"></i><span class="badge">0</span></div>
                <div class="user-profile" id="userProfile">
                    <span id="userName"></span>
                    <div class="user-avatar" id="userAvatar"></div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="welcome-card">
                <div>
                    <h2 id="welcomeMsg">Good morning, <span id="welcomeName"></span> 👋</h2>
                    <p id="welcomeSubtext">Here’s an overview of your service requests</p>
                </div>
                <div><i class="fas fa-calendar-alt"></i> <span id="currentDate"></span></div>
            </div>

            <div class="stats-grid" id="statsGrid"></div>

            <div class="filter-bar">
                <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search by ticket ID or subject..."></div>
                <select id="statusFilter" class="filter-select">
                    <option value="">All status</option>
                    <option value="pending_approval">Pending</option>
                    <option value="approved">Approved</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                    <option value="rejected">Rejected</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="">All services</option>
                    <option value="repair">Repair & Maintenance</option>
                    <option value="ict">IT Services</option>
                    <option value="vehicle">Vehicle Requisition</option>
                    <option value="aims">AIMS Change Request</option>
                    <option value="asws_membership">ASWS Registration</option>
                    <option value="asws_loan">ASWS Loan</option>
                </select>
                <input type="date" id="dateFilter" class="filter-input" placeholder="Date">
            </div>

            <div id="ticketsContainer"></div>
        </div>
    </div>
</div>

<!-- Modal for viewing ticket details -->
<div id="ticketModal" class="modal">
    <div class="modal-content" style="max-width: 1000px;">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<!-- Modal for editing ticket (only title & description, no priority) -->
<div id="editTicketModal" class="edit-modal">
    <div class="edit-modal-content">
        <span class="modal-close" onclick="closeEditModal()">&times;</span>
        <h2><i class="fas fa-edit"></i> Edit Ticket</h2>
        <form id="editTicketForm">
            <div style="margin-bottom: 20px;">
                <label>Title</label>
                <input type="text" id="editTitle" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Description</label>
                <textarea id="editDescription" rows="4"></textarea>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn-primary-sm" onclick="closeEditModal()" style="background: #9AA6B5;">Cancel</button>
                <button type="submit" class="btn-primary-sm" style="background: #E68A2E;">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    let allTickets = [];
    let filteredTickets = [];
    let currentPage = 1;
    const rowsPerPage = 5;
    let currentEditTicketId = null;
    const user = getUser();

    function getToken() { return localStorage.getItem('token'); }
    function getUser() { return JSON.parse(localStorage.getItem('user') || '{}'); }

    async function apiCall(endpoint, options = {}) {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json', ...options.headers };
        if (token) headers['x-auth-token'] = token;
        const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
        if (res.status === 401) {
            localStorage.clear();
            window.location.href = 'index.html';
            throw new Error('Session expired');
        }
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Request failed');
        return data;
    }

    if (!user || !user.id) window.location.href = 'index.html';

    // Header info
    document.getElementById('userName').innerText = user.full_name || (user.email ? user.email.split('@')[0] : 'User');
    document.getElementById('userAvatar').innerText = (user.full_name || 'U').charAt(0).toUpperCase();
    const displayName = user.full_name || (user.email ? user.email.split('@')[0] : 'User');
    document.getElementById('welcomeName').innerText = displayName;
    const hour = new Date().getHours();
    let greeting = 'Good morning';
    if (hour >= 12 && hour < 18) greeting = 'Good afternoon';
    else if (hour >= 18) greeting = 'Good evening';
    document.getElementById('welcomeMsg').innerHTML = `${greeting}, <span id="welcomeName">${displayName}</span> 👋`;
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // Logout and settings
    document.getElementById('logoutBtnSidebar').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };
    document.getElementById('settingsBtnSidebar').onclick = () => { window.location.href = 'settings.html'; };

    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

    const aswsMenu = document.getElementById('aswsMenu');
    const aswsSubmenu = document.getElementById('aswsSubmenu');
    aswsMenu.addEventListener('click', (e) => { e.stopPropagation(); aswsSubmenu.classList.toggle('show'); });

    // Sidebar navigation
    document.querySelectorAll('.nav-item[data-link], .submenu li').forEach(el => {
        el.addEventListener('click', () => {
            const link = el.dataset.link;
            if (link === 'dashboard') window.location.reload();
            else if (link === 'it-services') window.location.href = 'ict-form.html';
            else if (link === 'aims') window.location.href = 'aims-change-form.html';
            else if (link === 'repair') window.location.href = 'repair-form.html';
            else if (link === 'vehicle') window.location.href = 'vehicle-requisition-form.html';
            else if (link === 'asws-registration') window.location.href = 'submit-request.html?category=asws_membership';
            else if (link === 'asws-loan') window.location.href = 'submit-request.html?category=asws_loan';
        });
    });

    // Delete ticket function
    async function deleteTicket(ticketId, ticketNumber) {
        if (!confirm(`Are you sure you want to delete ticket ${ticketNumber}? This cannot be undone.`)) return;
        try {
            await apiCall(`/requests/${ticketId}`, { method: 'DELETE' });
            alert('Ticket deleted successfully.');
            await loadTickets();
            renderStats();
        } catch (err) {
            alert('Delete failed: ' + err.message);
        }
    }

    // Edit ticket functions
    function openEditModal(ticketId) {
        const ticket = allTickets.find(t => t.id === ticketId);
        if (!ticket) return;
        if (ticket.status !== 'pending_approval') {
            alert('You can only edit pending tickets.');
            return;
        }
        currentEditTicketId = ticketId;
        document.getElementById('editTitle').value = ticket.title || '';
        document.getElementById('editDescription').value = ticket.description || '';
        document.getElementById('editTicketModal').classList.add('active');
    }
    function closeEditModal() { document.getElementById('editTicketModal').classList.remove('active'); currentEditTicketId = null; }
    document.getElementById('editTicketForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentEditTicketId) return;
        try {
            await apiCall(`/requests/${currentEditTicketId}`, {
                method: 'PUT',
                body: JSON.stringify({ title: document.getElementById('editTitle').value, description: document.getElementById('editDescription').value })
            });
            alert('Ticket updated.');
            closeEditModal();
            await loadTickets();
            renderStats();
        } catch (err) { alert('Update failed: ' + err.message); }
    });

    async function loadTickets() {
        try {
            const requests = await apiCall('/requests');
            allTickets = requests.filter(r => r.created_by === user.id);
            applyFilters();
        } catch (err) {
            document.getElementById('ticketsContainer').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Failed to load tickets</p><div class="small">${err.message}</div></div>`;
        }
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const category = document.getElementById('categoryFilter').value;
        const date = document.getElementById('dateFilter').value;
        filteredTickets = allTickets.filter(t => {
            const matchSearch = t.ticket_number.toLowerCase().includes(searchTerm) || t.title.toLowerCase().includes(searchTerm);
            const matchStatus = !status || t.status === status;
            const matchCategory = !category || t.category === category;
            const matchDate = !date || new Date(t.created_at).toISOString().slice(0,10) === date;
            return matchSearch && matchStatus && matchCategory && matchDate;
        });
        currentPage = 1;
        renderTickets();
        renderStats();
    }

    function renderTickets() {
        const container = document.getElementById('ticketsContainer');
        if (filteredTickets.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><p>No tickets found</p><div class="small">Create a new request using the sidebar.</div></div>`;
            return;
        }
        const start = (currentPage-1)*rowsPerPage;
        const paginated = filteredTickets.slice(start, start+rowsPerPage);
        let tableHtml = `<div class="table-container"><table class="tickets-table"><thead><tr><th>Ticket ID</th><th>Service Type</th><th>Subject</th><th>Submission Date</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        for (const t of paginated) {
            const isPending = (t.status === 'pending_approval');
            tableHtml += `<tr>
                <td>${t.ticket_number}</td>
                <td>${t.category.replace('_',' ')}</td>
                <td>${escapeHtml(t.title)}</td>
                <td>${new Date(t.created_at).toLocaleDateString()}</td>
                <td><span class="status-badge status-${t.status}">${t.status.replace('_',' ')}</span></td>
                <td class="action-cell">
                    <div class="action-buttons">
                        <button class="action-btn view-btn" onclick="showTicketModal(${t.id})">View</button>
                        ${isPending ? `<button class="action-btn edit-btn" onclick="openEditModal(${t.id})">Edit</button>` : ''}
                        ${isPending ? `<button class="action-btn delete-btn" onclick="deleteTicket(${t.id}, '${t.ticket_number}')">Delete</button>` : ''}
                    </div>
                </td>
            </tr>`;
        }
        tableHtml += `</tbody></table><div id="pagination" class="pagination"></div></div>`;
        container.innerHTML = tableHtml;
        const totalPages = Math.ceil(filteredTickets.length / rowsPerPage);
        const pagDiv = document.getElementById('pagination');
        if (pagDiv) {
            pagDiv.innerHTML = `<button onclick="changePage(-1)" ${currentPage===1 ? 'disabled' : ''}>Prev</button><span>Page ${currentPage} of ${totalPages||1}</span><button onclick="changePage(1)" ${currentPage===totalPages||totalPages===0 ? 'disabled' : ''}>Next</button>`;
        }
    }

    window.changePage = (delta) => { currentPage += delta; renderTickets(); };

    function renderStats() {
        const total = filteredTickets.length;
        const pending = filteredTickets.filter(t => t.status === 'pending_approval').length;
        const approved = filteredTickets.filter(t => t.status === 'approved').length;
        const rejected = filteredTickets.filter(t => t.status === 'rejected').length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card" style="border-left-color:#F59E0B"><div class="stat-number">${total}</div><div class="stat-title">Total Tickets</div></div>
            <div class="stat-card" style="border-left-color:#3B82F6"><div class="stat-number">${pending}</div><div class="stat-title">Pending</div></div>
            <div class="stat-card" style="border-left-color:#10B981"><div class="stat-number">${approved}</div><div class="stat-title">Approved</div></div>
            <div class="stat-card" style="border-left-color:#EF4444"><div class="stat-number">${rejected}</div><div class="stat-title">Rejected</div></div>
        `;
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);
    document.getElementById('categoryFilter').addEventListener('change', applyFilters);
    document.getElementById('dateFilter').addEventListener('change', applyFilters);

    let currentModalTicket = null;

    async function showTicketModal(ticketId) {
        const modal = document.getElementById('ticketModal');
        const modalContent = document.getElementById('modalContent');
        modalContent.innerHTML = '<div style="text-align:center; padding:40px;">Loading...</div>';
        modal.classList.add('active');
        try {
            const data = await apiCall(`/requests/${ticketId}`);
            currentModalTicket = data.ticket;
            renderModalTicket();
            renderModalComments(data.comments);
            attachModalEventListeners();
        } catch (err) {
            modalContent.innerHTML = `<div style="color:red; padding:20px;">Error: ${err.message}</div>`;
        }
    }

    function closeModal() {
        document.getElementById('ticketModal').classList.remove('active');
        currentModalTicket = null;
    }

    function renderModalTicket() {
        const container = document.getElementById('modalContent');
        const ticket = currentModalTicket;
        const fd = ticket.form_data || {};

        // --- Vehicle allocation details (enhanced: show vehicle name and driver phone) ---
        const allocation = fd.vehicle_allocation || null;
        let allocationInfoHtml = '';
        if (allocation && (allocation.vehicle_no || allocation.driver_name)) {
            allocationInfoHtml = `
                <div class="info-item"><span class="info-label">Allocated Driver</span><span class="info-value">${escapeHtml(allocation.driver_name || '-')}</span></div>
                <div class="info-item"><span class="info-label">Driver Phone</span><span class="info-value">${escapeHtml(allocation.driver_phone || allocation.phone || '-')}</span></div>
                <div class="info-item"><span class="info-label">Allocated Vehicle Name</span><span class="info-value">${escapeHtml(allocation.vehicle_name || '-')}</span></div>
                <div class="info-item"><span class="info-label">Allocated Vehicle No.</span><span class="info-value">${escapeHtml(allocation.vehicle_no || '-')}</span></div>
                <div class="info-item"><span class="info-label">Allocated By</span><span class="info-value">${escapeHtml(allocation.allocated_by || '-')}</span></div>
                <div class="info-item"><span class="info-label">Allocated At</span><span class="info-value">${allocation.allocated_at ? new Date(allocation.allocated_at).toLocaleString() : '-'}</span></div>
            `;
        }

        // Requisitioner info
        let requisitionerHtml = '';
        if (fd.requisitioner) {
            const r = fd.requisitioner;
            requisitionerHtml = `
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-user"></i> Requisitioned by</div>
                    <div class="info-grid">
                        <div class="info-item"><span class="info-label">Name</span><span class="info-value">${escapeHtml(r.name || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Designation</span><span class="info-value">${escapeHtml(r.designation || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Division</span><span class="info-value">${escapeHtml(r.division || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Email</span><span class="info-value">${escapeHtml(r.email || '-')}</span></div>
                        <div class="info-item"><span class="info-label">Phone</span><span class="info-value">${escapeHtml(r.phone || '-')}</span></div>
                    </div>
                </div>
            `;
        }

        // Vehicle‑specific display (trips + date range)
        let itemsHtml = '';
        if (ticket.category === 'vehicle' && fd.trips && fd.trips.length) {
            const dateRangeHtml = `
                <div class="info-grid" style="margin-bottom: 8px;">
                    <div class="info-item"><span class="info-label">Start Date</span><span class="info-value">${escapeHtml(fd.start_date || '-')}</span></div>
                    <div class="info-item"><span class="info-label">End Date</span><span class="info-value">${escapeHtml(fd.end_date || '-')}</span></div>
                </div>
            `;
            const tripsTable = `
                <table class="items-table">
                    <thead><tr><th>#</th><th>Place From</th><th>Place To</th><th>Officials</th><th>Purpose</th></tr></thead>
                    <tbody>
                        ${fd.trips.map((trip, idx) => `
                            <tr>
                                <td>${idx+1}</td>
                                <td>${escapeHtml(trip.place_from || '')}</td>
                                <td>${escapeHtml(trip.place_to || '')}</td>
                                <td>${escapeHtml(trip.officials || '')}</td>
                                <td>${escapeHtml(trip.purpose || '')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            itemsHtml = `
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-calendar-alt"></i> Trip Period</div>
                    ${dateRangeHtml}
                    <div class="modal-section-title"><i class="fas fa-road"></i> Trips</div>
                    ${tripsTable}
                </div>
            `;
        } else if (fd.items && fd.items.length) {
            itemsHtml = `
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-list"></i> Items requested</div>
                    <table class="items-table">
                        <thead><tr><th>#</th><th>Item Type</th><th>Defects</th><th>Remarks</th></td></thead>
                        <tbody>
                            ${fd.items.map((item, idx) => `
                                <tr>
                                    <td>${idx+1}</td>
                                    <td>${escapeHtml(item.itemType || item.description || '')}</td>
                                    <td>${escapeHtml(item.defects || '')}</td>
                                    <td>${escapeHtml(item.remarks || '')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        } else {
            const otherFields = Object.entries(fd).filter(([key]) => !['requisitioner', 'items', 'requisition_date', 'trips', 'start_date', 'end_date', 'vehicle_allocation'].includes(key));
            if (otherFields.length) {
                itemsHtml = `
                    <div class="modal-section">
                        <div class="modal-section-title"><i class="fas fa-info-circle"></i> Additional details</div>
                        <div class="info-grid">
                            ${otherFields.map(([key, val]) => `<div class="info-item"><span class="info-label">${escapeHtml(key)}</span><span class="info-value">${escapeHtml(String(val))}</span></div>`).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // Status badge
        let statusClass = 'status-badge-lg';
        if (ticket.status === 'pending_approval') statusClass += ' status-pending_approval';
        else if (ticket.status === 'approved') statusClass += ' status-approved';
        else if (ticket.status === 'in_progress') statusClass += ' status-in_progress';
        else if (ticket.status === 'resolved') statusClass += ' status-resolved';
        else if (ticket.status === 'rejected') statusClass += ' status-rejected';
        let statusHtml = `<span class="${statusClass}">${ticket.status.replace('_',' ')}</span>`;

        container.innerHTML = `
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-ticket-alt"></i> Ticket information</div>
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">Ticket number</span><span class="info-value">${escapeHtml(ticket.ticket_number)}</span></div>
                    <div class="info-item"><span class="info-label">Title</span><span class="info-value">${escapeHtml(ticket.title)}</span></div>
                    <div class="info-item"><span class="info-label">Category</span><span class="info-value">${escapeHtml(ticket.category)}</span></div>
                    <div class="info-item"><span class="info-label">Requester</span><span class="info-value">${escapeHtml(ticket.requester_name || ticket.requester_email)}</span></div>
                    <div class="info-item"><span class="info-label">Created</span><span class="info-value">${new Date(ticket.created_at).toLocaleString()}</span></div>
                    <div class="info-item"><span class="info-label">Status</span><span class="info-value">${statusHtml}</span></div>
                    <div class="info-item"><span class="info-label">Description</span><span class="info-value">${escapeHtml(ticket.description)}</span></div>
                    ${allocationInfoHtml}
                </div>
            </div>
            ${requisitionerHtml}
            ${itemsHtml}
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-comments"></i> Comments</div>
                <div id="modalCommentsSection"></div>
            </div>
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-plus-circle"></i> Add comment</div>
                <textarea id="modalNewComment" rows="3" placeholder="Write your message..."></textarea>
                <div style="margin: 8px 0;"><label><input type="checkbox" id="modalInternalCheck"> Internal note (team only)</label></div>
                <button id="modalSubmitCommentBtn" class="btn-primary-sm">Post Comment</button>
            </div>
        `;
    }

    function renderModalComments(comments) {
        const container = document.getElementById('modalCommentsSection');
        if (!comments.length) {
            container.innerHTML = '<p style="color:#64748B;">No comments yet.</p>';
            return;
        }
        let html = '';
        for (const c of comments) {
            const isInternal = c.is_internal;
            if (isInternal) continue; // regular users don't see internal notes
            html += `
                <div class="comment">
                    <div class="comment-meta"><strong>${escapeHtml(c.author_name)}</strong> · ${new Date(c.created_at).toLocaleString()}</div>
                    <div>${escapeHtml(c.message)}</div>
                </div>
            `;
        }
        container.innerHTML = html || '<p style="color:#64748B;">No public comments yet.</p>';
    }

    function attachModalEventListeners() {
        const submitBtn = document.getElementById('modalSubmitCommentBtn');
        if (submitBtn) {
            submitBtn.onclick = async () => {
                const message = document.getElementById('modalNewComment').value.trim();
                if (!message) return alert('Please enter a comment');
                const isInternal = document.getElementById('modalInternalCheck').checked;
                await apiCall(`/requests/${currentModalTicket.id}/comment`, {
                    method: 'POST',
                    body: JSON.stringify({ message, is_internal: isInternal })
                });
                document.getElementById('modalNewComment').value = '';
                document.getElementById('modalInternalCheck').checked = false;
                showTicketModal(currentModalTicket.id);
                loadTickets();
            };
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    async function updateNotificationCount() {
        try {
            const notifs = await apiCall('/notifications');
            const badge = document.querySelector('#notificationBell .badge');
            if (badge) { badge.textContent = notifs.length; badge.style.display = notifs.length ? 'inline-flex' : 'none'; }
        } catch(e) {}
    }
    document.getElementById('notificationBell').addEventListener('click', async () => {
        const notifs = await apiCall('/notifications');
        if (!notifs.length) { alert('No new notifications'); return; }
        let msg = 'Notifications:\n' + notifs.map(n => `- ${n.message}`).join('\n');
        if (confirm(msg + '\nMark all as read?')) {
            await apiCall('/notifications/mark-read', { method: 'POST', body: JSON.stringify({}) });
            updateNotificationCount();
        }
    });
    setInterval(updateNotificationCount, 30000);
    updateNotificationCount();

    loadTickets();
</script>
</body>
</html>
